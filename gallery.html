<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>畫廊 - OO班 AI 創作畫廊</title>
<meta name="description" content="瀏覽全班同學的 AI 創作作品，可依班級、AI 工具、關鍵字篩選。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header blackboard-bg">
  <div class="container">
    <a href="index.html" class="brand">🖍️ OO班<small>AI GALLERY</small></a>
    <nav class="nav-tabs">
      <a class="nav-tab" data-page="home" href="index.html">首頁</a>
      <a class="nav-tab" data-page="gallery" href="gallery.html">畫廊</a>
      <a class="nav-tab" data-page="submit" href="submit.html">我要投稿</a>
      <a class="nav-tab" data-page="about" href="about.html">關於</a>
    </nav>
  </div>
</header>

<section class="hero blackboard-bg" style="padding:40px 0 30px;">
  <div class="container">
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,3rem);">作品畫廊</h1>
    <p class="hero-desc" style="margin-bottom:0;">全班同學的 AI 創作都釘在這裡，找找你喜歡的作品，幫他按個讚吧！</p>
  </div>
</section>

<section class="board-section cork-bg">
  <div class="container">
    <div class="filter-bar">
      <span class="filter-label">篩選：</span>
      <select id="filter-class" aria-label="依班級篩選">
        <option value="">全部班級</option>
      </select>
      <select id="filter-tool" aria-label="依 AI 工具篩選">
        <option value="">全部 AI 工具</option>
      </select>
      <input type="text" id="filter-search" placeholder="搜尋姓名 / Prompt / 說明 / 標籤...">
    </div>
    <p class="result-count" id="result-count" style="color:#5b4f3f;"></p>
    <div class="note-grid" id="gallery-grid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    © <span id="footer-year"></span> OO班 AI 創作畫廊・本網站由學生與老師共同維護
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
