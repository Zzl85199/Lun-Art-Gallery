<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故事接龍 - AI 創作畫廊</title>
<meta name="description" content="全班投票決定下一張接進故事的作品，一起用大家的 AI 創作接出一個獨一無二的故事。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Huninn&family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header blackboard-bg">
  <div class="container">
    <a href="index.html" class="brand"><span class="brand-icon">🖍️</span> AI 創作畫廊<small>ㄚ倫老師魔法實驗室</small></a>
    <nav class="nav-tabs">
      <a class="nav-tab" data-page="home" href="index.html">首頁</a>
      <a class="nav-tab" data-page="gallery" href="gallery.html">畫廊</a>
      <a class="nav-tab" data-page="submit" href="submit.html">我要投稿</a>
      <a class="nav-tab" data-page="story" href="story.html">故事接龍</a>
      <a class="nav-tab" data-page="about" href="about.html">關於</a>
    </nav>
  </div>
</header>

<section class="hero blackboard-bg" style="padding:40px 0 30px;">
  <span class="hero-decor d1" style="font-size:1.8rem;">🎲</span>
  <span class="hero-decor d2" style="font-size:1.6rem;">📖</span>
  <div class="container">
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,3rem);">故事接龍投票</h1>
    <p class="hero-desc" style="margin-bottom:0;">大家一起投票，決定下一張接進故事的作品。時間到自動結算，得票最高的作品就會接上故事鏈！</p>
  </div>
</section>
<svg class="wave-divider" viewBox="0 0 1200 44" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,20 C150,44 300,0 450,20 C600,40 750,4 900,22 C1050,40 1150,10 1200,20 L1200,44 L0,44 Z" style="fill:var(--cork);"/>
</svg>

<section class="board-section cork-bg">
  <div class="container">

    <div id="story-loading" class="story-msg">故事載入中...</div>
    <div id="story-empty" class="story-msg" style="display:none;">還沒有作品可以開始接龍，快去<a href="submit.html">投稿</a>第一張作品，讓故事開始吧！</div>
    <div id="story-error" class="story-msg story-msg-error" style="display:none;"></div>

    <div id="story-content" style="display:none;">
      <h2 class="board-heading" style="font-size:1.6rem;">📖 目前的故事</h2>
      <div class="story-chain" id="story-chain"></div>

      <div id="round-section" style="margin-top:44px;">
        <h2 class="board-heading" style="font-size:1.6rem;">🗳️ 這一輪投票中</h2>
        <p style="text-align:center;color:#5b4f3f;" id="round-countdown"></p>
        <div class="story-round-grid" id="story-round-grid"></div>
      </div>

      <div id="round-finished" class="story-msg" style="display:none;">
        目前所有已上架的作品都已經接進故事鏈了！快去<a href="submit.html">投稿新作品</a>，讓故事可以繼續下去吧 🎉
      </div>
    </div>

  </div>
</section>

<footer class="site-footer">
  <div class="container">
    © <span id="footer-year"></span> AI 創作畫廊・本網站由學生與老師共同維護
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/story.js"></script>
</body>
</html>
